name: Build & Deploy to GlowHost

on:
  push:
    branches:
      - main   # change to 'master' if that's your default branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build
        run: npm run build
        env:
          # Add any build-time env vars here if needed
          NODE_ENV: production

      - name: Deploy to GlowHost via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: /public_html/budget/   # path relative to your FTP root
          dangerous-clean-slate: false  # set to true to wipe server dir on each deploy (careful!)
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            .htaccess          # exclude so your Passenger .htaccess is never overwritten
